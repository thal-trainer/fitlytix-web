<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>FITLYTIX</title>
</head>
<body style="background:#000;color:#fff;font-family:sans-serif;padding:40px;">

  <h1>FITLYTIX</h1>
  <div id="status">Initializing...</div>
  <div id="form" style="display:none;">
    <p>Set your password</p>
    <input type="password" id="pw" placeholder="New password" style="display:block;margin:10px 0;padding:10px;width:300px;background:#111;color:#fff;border:1px solid #333;"/>
    <input type="password" id="pw2" placeholder="Confirm password" style="display:block;margin:10px 0;padding:10px;width:300px;background:#111;color:#fff;border:1px solid #333;"/>
    <button onclick="setPassword()" style="padding:10px 20px;background:#C4A8C8;border:none;cursor:pointer;font-weight:bold;">SET PASSWORD</button>
    <p id="msg" style="margin-top:10px;"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    
    const client = createClient(
      'https://fsbnfvjqndcevygqhxkt.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzYm5mdmpxbmRjZXZ5Z3FoeGt0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDU3MjkwODksImV4cCI6MjA2MTMwNTA4OX0.GdDmABkgcSAqBSMDrjSiWbUmlkMJYLOwsHAzFslpv-g',
      { auth: { detectSessionInUrl: true, flowType: 'implicit', persistSession: true } }
    );
    
    async function init() {
      document.getElementById('status').textContent = 'Checking...';
    
      const hash = window.location.hash.replace('#', '');
      const params = new URLSearchParams(hash);
      const accessToken = params.get('access_token');
      const refreshToken = params.get('refresh_token');
    
      document.getElementById('status').textContent = 'Token found: ' + (accessToken ? 'YES' : 'NO');
    
      if (accessToken) {
        const { data, error } = await client.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken || '',
        });
    
        if (error) {
          document.getElementById('status').textContent = 'Error: ' + error.message;
          return;
        }
    
        if (data.session) {
          document.getElementById('status').textContent = 'Ready to set password';
          document.getElementById('form').style.display = 'block';
          return;
        }
      }
    
      document.getElementById('status').textContent = 'No valid session found. Please use the invite link from your email.';
    }
    
    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>FITLYTIX</title>
</head>
<body style="background:#000;color:#fff;font-family:sans-serif;padding:40px;">

  <h1>FITLYTIX</h1>
  <div id="status">Initializing...</div>
  <div id="form" style="display:none;">
    <p>Set your password</p>
    <input type="password" id="pw" placeholder="New password" style="display:block;margin:10px 0;padding:10px;width:300px;background:#111;color:#fff;border:1px solid #333;"/>
    <input type="password" id="pw2" placeholder="Confirm password" style="display:block;margin:10px 0;padding:10px;width:300px;background:#111;color:#fff;border:1px solid #333;"/>
    <button id="set-btn" style="padding:10px 20px;background:#C4A8C8;border:none;cursor:pointer;font-weight:bold;">SET PASSWORD</button>
    <p id="msg" style="margin-top:10px;"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
  
    const client = createClient(
      'https://fsbnfvjqndcevygqhxkt.supabase.co',
      'YOUR_ANON_KEY_HERE',
      { auth: { detectSessionInUrl: true, flowType: 'implicit', persistSession: true } }
    );
  
    async function init() {
      document.getElementById('status').textContent = 'Checking...';
  
      const hash = window.location.hash.replace('#', '');
      const params = new URLSearchParams(hash);
      const accessToken = params.get('access_token');
      const refreshToken = params.get('refresh_token');
  
      if (accessToken) {
        const { data, error } = await client.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken || '',
        });
  
        if (error) {
          document.getElementById('status').textContent = 'Error: ' + error.message;
          return;
        }
  
        if (data.session) {
          document.getElementById('status').textContent = 'Ready to set password';
          document.getElementById('form').style.display = 'block';
          return;
        }
      }
  
      document.getElementById('status').textContent = 'No valid session. Please use the invite link from your email.';
    }
  
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('set-btn').addEventListener('click', async function() {
        const pw = document.getElementById('pw').value;
        const pw2 = document.getElementById('pw2').value;
        const msg = document.getElementById('msg');
  
        msg.textContent = 'Processing...';
  
        if (pw.length < 8) {
          msg.textContent = 'Password must be at least 8 characters';
          return;
        }
        if (pw !== pw2) {
          msg.textContent = 'Passwords do not match';
          return;
        }
  
        const { error } = await client.auth.updateUser({ password: pw });
  
        if (error) {
          msg.textContent = 'Error: ' + error.message;
        } else {
          document.getElementById('form').style.display = 'none';
          document.getElementById('status').textContent = '✅ Password set! Open the FITLYTIX app to login with your email and new password.';
        }
      });
  
      init();
    });
  </script>
</body>
</html>

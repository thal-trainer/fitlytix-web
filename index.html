<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>FITLYTIX</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#000;color:#fff;font-family:sans-serif;padding:40px;">

  <h1>FITLYTIX</h1>
  <div id="status">Loading...</div>
  <div id="form" style="display:none;">
    <p>Set your password</p>
    <input type="password" id="pw" placeholder="New password" style="display:block;margin:10px 0;padding:10px;width:300px;"/>
    <input type="password" id="pw2" placeholder="Confirm password" style="display:block;margin:10px 0;padding:10px;width:300px;"/>
    <button onclick="setPassword()" style="padding:10px 20px;background:#C4A8C8;border:none;cursor:pointer;">SET PASSWORD</button>
    <p id="msg"></p>
  </div>

  <script>
    const supabase = window.supabase.createClient(
      'https://fsbnfvjqndcevygqhxkt.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzYm5mdmpxbmRjZXZ5Z3FoeGt0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDU3MjkwODksImV4cCI6MjA2MTMwNTA4OX0.GdDmABkgcSAqBSMDrjSiWbUmlkMJYLOwsHAzFslpv-g',
      { auth: { detectSessionInUrl: true, flowType: 'implicit' } }
    );

    document.getElementById('status').textContent = 'URL: ' + window.location.href;

    supabase.auth.onAuthStateChange((event, session) => {
      document.getElementById('status').textContent = 'Event: ' + event + ' | Session: ' + (session ? 'YES' : 'NO');
      if (session) {
        document.getElementById('form').style.display = 'block';
      }
    });

    async function setPassword() {
      const pw = document.getElementById('pw').value;
      const pw2 = document.getElementById('pw2').value;
      if (pw !== pw2) { document.getElementById('msg').textContent = 'Passwords do not match'; return; }
      const { error } = await supabase.auth.updateUser({ password: pw });
      document.getElementById('msg').textContent = error ? error.message : 'Password set! Open the FITLYTIX app to login.';
    }
  </script>
</body>
</html>
